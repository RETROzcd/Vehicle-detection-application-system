{% extends 'layout.html' %}
{% block content %}
  <div>

    <div class="container">
      <div style="margin-bottom: 10px">
        <a class="btn btn-success" href="/admin/add/">
          <span class="glyphicon glyphicon-plus-sign" aria-hidden="true"></span>
          新建管理员
        </a>
        <div style="float:right;width:300px;">
          <form method="get">
            <div class="input-group">
              <input type="text" name="q" class="form-control" placeholder="Search for..." value="{{search_data}}">
              <span class="input-group-btn">
                <button class="btn btn-default" type="submit">
                  <span class="glyphicon glyphicon-search" aria-hidden="true"></span>
                </button>
              </span>
            </div><!-- /input-group -->
          </form>
        </div>
      </div>

      <div class="panel panel-default">
        <!-- Default panel contents -->
        <div class="panel-heading">
          <span class="glyphicon glyphicon-th-list" aria-hidden="true">
            管理员列表
          </span>
        </div>

        <!-- Table -->
        <table class="table table-bordered">
          <thead>
            <tr>
              <th>id</th>
              <th>用户名</th>
              <th>密码</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            {% for obj in queryset %}
            <tr>
              <th>{{obj.id}}</th>
              <td>{{obj.username}}</td>
              <td>*********</td>
              <td>
                <a class="btn btn-primary" href="#">编辑</a>
                <a class="btn btn-danger" href="#">删除</a>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
      <div class="clearfix">
      <ul class="pagination">
        {{ page_string }}
        </ul>
        </div>
<!--      <script>-->
<!--        function validateForm() {-->
<!--          var pageInput = document.querySelector('input[name="page"]');-->
<!--          if (pageInput.value.trim() === '') {-->
<!--            alert('请输入页码！');-->
<!--            return false; // 阻止表单提交-->
<!--          }-->
<!--          return true; // 允许表单提交-->
<!--        }-->
<!--      </script>-->
    </div>
  </div>
{% endblock%}
